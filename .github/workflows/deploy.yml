name: Deploy NEXONE PCI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nexone-pci-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare app directory on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
          script_stop: true
          script: |
            set -e

            APP_DIR=~/nexora-node/apps/NEXONE-PCI

            mkdir -p $APP_DIR

            if [ -f $APP_DIR/.env ]; then
              cp $APP_DIR/.env /tmp/nexone-pci.env
              echo "Existing .env backed up"
            else
              echo "No existing .env found"
            fi

      - name: Upload source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
          source: "."
          target: "~/nexora-node/apps/NEXONE-PCI"
          rm: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
          script_stop: true
          command_timeout: 20m
          script: |
            set -e

            APP_DIR=~/nexora-node/apps/NEXONE-PCI
            cd $APP_DIR

            if [ -f /tmp/nexone-pci.env ]; then
              mv /tmp/nexone-pci.env .env
              echo ".env restored"
            fi

            if [ ! -f .env ]; then
              if [ -f .env.example ]; then
                cp .env.example .env
                echo ".env created from .env.example"
              else
                echo "ERROR: .env and .env.example not found"
                exit 1
              fi
            fi

            echo "Building and starting containers..."
            docker compose -f docker-compose.yml --env-file .env up -d --build

            echo "Checking containers..."
            docker compose ps

            docker ps --format '{{.Names}}' | grep -q '^nexone-pci-postgres$'
            docker ps --format '{{.Names}}' | grep -q '^nexone-pci-backend$'
            docker ps --format '{{.Names}}' | grep -q '^nexone-pci-frontend$'

            echo "Running backend health check..."
            docker exec nexone-pci-backend wget -qO- http://127.0.0.1:8080/health > /dev/null

            echo "Deploy NEXONE PCI completed successfully"
