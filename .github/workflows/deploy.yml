name: Deploy NEXONE PCI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nexone-pci-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare app directory on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            set -e
            mkdir -p ~/nexora-node/apps/NEXONE-PCI

      - name: Upload source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "."
          target: "~/nexora-node/apps/NEXONE-PCI"

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            cd ~/nexora-node/apps/NEXONE-PCI
            test -f .env || cp .env.example .env
            docker compose up -d --build
            docker ps --format '{{.Names}}' | grep '^nexone-pci-postgres$'
            docker ps --format '{{.Names}}' | grep '^nexone-pci-backend$'
            docker ps --format '{{.Names}}' | grep '^nexone-pci-frontend$'
