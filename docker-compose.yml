services:
  # ─── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: nexone-pci-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./Backend
    container_name: nexone-pci-backend
    restart: unless-stopped
    environment:
      PORT: 8080
      ENV: ${ENV}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP_HOURS: ${JWT_EXP_HOURS}
      UPLOAD_DIR: /app/uploads
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.nexone-pci-api.rule=Host(`nexone-pci.nexoratech.co`) && (PathPrefix(`/api`) || Path(`/health`))"
      - "traefik.http.routers.nexone-pci-api.entrypoints=websecure"
      - "traefik.http.routers.nexone-pci-api.tls.certresolver=myresolver"
      - "traefik.http.services.nexone-pci-api.loadbalancer.server.port=8080"

  # ─── Frontend ────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      args:
        # VITE_ vars are baked into the JS bundle at build time by Vite.
        # Passing them as runtime `environment:` has no effect on the built
        # assets.  Use build args here so the Dockerfile ARG picks them up.
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: nexone-pci-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.nexone-pci.rule=Host(`nexone-pci.nexoratech.co`)"
      - "traefik.http.routers.nexone-pci.entrypoints=websecure"
      - "traefik.http.routers.nexone-pci.tls.certresolver=myresolver"
      - "traefik.http.services.nexone-pci.loadbalancer.server.port=80"

volumes:
  postgres_data:
  uploads_data:

networks:
  web:
    external: true
    name: web
