<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <!-- Background -->
  <rect width="300" height="120" fill="transparent"/>
  
  <!-- Left decorative element - Indonesian govt style shield/emblem area -->
  <circle cx="55" cy="60" r="45" fill="#1B4F8A" opacity="0.9"/>
  <circle cx="55" cy="60" r="38" fill="none" stroke="#F0C040" stroke-width="2.5"/>
  
  <!-- Simple garuda-inspired wing shapes -->
  <path d="M30 55 Q45 35 55 45 Q65 35 80 55" fill="none" stroke="#F0C040" stroke-width="2" stroke-linecap="round"/>
  <path d="M28 60 Q43 40 55 50 Q67 40 82 60" fill="none" stroke="#F0C040" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Center symbol -->
  <circle cx="55" cy="63" r="12" fill="#F0C040"/>
  <path d="M55 53 L58 61 L67 61 L60 66 L63 74 L55 69 L47 74 L50 66 L43 61 L52 61 Z" fill="#1B4F8A" transform="scale(0.7) translate(23.5, 36)"/>
  
  <!-- Text area -->
  <!-- PUSINTEK main text -->
  <text x="108" y="48" font-family="Arial, sans-serif" font-size="26" font-weight="800" fill="#1B4F8A" letter-spacing="1">PUSINTEK</text>
  
  <!-- Divider line -->
  <line x1="108" y1="56" x2="288" y2="56" stroke="#F0C040" stroke-width="1.5"/>
  
  <!-- Subtitle -->
  <text x="108" y="73" font-family="Arial, sans-serif" font-size="8.5" fill="#2C3E50" letter-spacing="0.3">Pusat Sistem Informasi dan</text>
  <text x="108" y="85" font-family="Arial, sans-serif" font-size="8.5" fill="#2C3E50" letter-spacing="0.3">Teknologi Keuangan</text>
  
  <!-- Bottom text -->
  <text x="108" y="104" font-family="Arial, sans-serif" font-size="7.5" fill="#7F8C8D" letter-spacing="0.2">Kementerian Keuangan Republik Indonesia</text>
</svg>
